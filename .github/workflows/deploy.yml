name: Build, Push & Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build once, push two tags:
      #   latest  – what Render always pulls on redeploy
      #   <sha>   – pinned snapshot for rollback (docker pull afzal023/real-estate-frontend:<sha>)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            afzal023/real-estate-frontend:latest
            afzal023/real-estate-frontend:${{ github.sha }}

      # Tell Render to pull the new latest image and redeploy
      - name: Trigger Render deploy
        run: |
          curl --silent --show-error --fail --max-time 30 \
            -X POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
